<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; text-align:center; padding:20px; }
.page { background:white; padding:20px; border-radius:10px; max-width:420px; margin:auto; }
.hidden { display:none; }
input { width:90%; padding:10px; margin:5px; }
button { padding:10px; width:100%; margin:5px 0; }
.item { background:#eee; margin:8px 0; padding:10px; border-radius:8px; }

#msg {
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#222;
color:#fff;
padding:10px 20px;
border-radius:8px;
display:none;
}

#modal {
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

#modalBox{
background:white;
padding:20px;
border-radius:10px;
width:80%;
max-width:300px;
}
</style>
</head>

<body>

<!-- ANA -->
<div id="home" class="page">
<h2>📦 GMB</h2>

<input id="barcode" placeholder="Barkod">
<input id="name" placeholder="Ürün adı">

<button onclick="add()">Kaydet</button>
<button onclick="showList()">Liste</button>
<button onclick="showScale()">⚖️ Terazi</button>
</div>

<!-- LİSTE -->
<div id="list" class="page hidden">
<h2>📋 Liste</h2>
<button onclick="goHome()">← Geri</button>
<div id="items"></div>
</div>

<!-- TERAZİ MENÜ -->
<div id="scaleMenu" class="page hidden">
<h2>⚖️ Terazi</h2>
<button onclick="openRegister()">📦 Ürün Kayıt</button>
<button onclick="openScaleList()">📋 Kod Listesi</button>
<button onclick="openCalc()">🧮 Hesaplama</button>
<button onclick="goHome()">← Geri</button>
</div>

<!-- TERAZİ KAYIT -->
<div id="register" class="page hidden">
<h3>📦 Terazi Kayıt</h3>

<input id="s_name" placeholder="Ürün adı">
<input id="s_code" placeholder="Kod" oninput="updatePrefix()">
<input id="prefix" disabled placeholder="Prefix">
<input id="s_price" placeholder="Kg fiyatı">

<button onclick="saveScale()">Kaydet</button>
<button onclick="showScale()">← Geri</button>
</div>

<!-- TERAZİ LİSTE -->
<div id="scaleListPage" class="page hidden">
<h3>📋 Terazi Listesi</h3>
<button onclick="showScale()">← Geri</button>
<div id="scaleList"></div>
</div>

<!-- HESAP -->
<div id="calc" class="page hidden">
<h3>🧮 Hesaplama</h3>

<input id="c_code" placeholder="Kod">
<input id="c_gram" placeholder="Gram">

<button onclick="calcScale()">Hesapla</button>
<button onclick="showScale()">← Geri</button>

<div id="result"></div>
</div>

<!-- MESAJ -->
<div id="msg"></div>

<!-- MODAL -->
<div id="modal">
  <div id="modalBox">
    <p id="modalText"></p>
    <button onclick="confirmYes()">Evet</button>
    <button onclick="closeModal()">Hayır</button>
  </div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("gmb")) || [];
let scaleData = JSON.parse(localStorage.getItem("scale")) || [];

let deleteIndex = null;
let deleteType = null;

function save(){ localStorage.setItem("gmb", JSON.stringify(data)); }
function saveScale(){ localStorage.setItem("scale", JSON.stringify(scaleData)); }

// ---------------- MESAJ ----------------
function msg(t){
  let m=document.getElementById("msg");
  m.innerText=t;
  m.style.display="block";
  setTimeout(()=>m.style.display="none",2000);
}

// ---------------- SAYFA ----------------
function hideAll(){
  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
}

function goHome(){
  hideAll();
  home.classList.remove("hidden");
}

function showList(){
  hideAll();
  list.classList.remove("hidden");
  render();
}

function showScale(){
  hideAll();
  scaleMenu.classList.remove("hidden");
}

// ---------------- NORMAL ----------------
function add(){
  let code = barcode.value;
  let name = document.getElementById("name").value;

  if(!code || !name) return msg("Boş bırakma");

  data.push({code,name});
  save();

  barcode.value="";
  name.value="";

  msg("Ürün eklendi");
}

function render(){
  items.innerHTML="";
  data.forEach((x,i)=>{
    let b=document.createElement("button");
    b.textContent=x.name;
    b.onclick=()=>detail(i);
    items.appendChild(b);
  });
}

function detail(i){
  let x=data[i];

  items.innerHTML=`
    <svg id="b"></svg>
    <p>${x.code}</p>
    <p>${x.name}</p>

    <button onclick="editNormal(${i})">Düzenle</button>
    <button onclick="askDelete(${i},'normal')">Sil</button>
    <button onclick="render()">←</button>
  `;

  JsBarcode("#b", x.code);
}

function editNormal(i){
  let n=prompt("Ad",data[i].name);
  let c=prompt("Kod",data[i].code);
  if(!n||!c) return;
  data[i]={name:n,code:c};
  save();
  render();
  msg("Güncellendi");
}

// ---------------- MODAL SİLME ----------------
function askDelete(i,type){
  deleteIndex=i;
  deleteType=type;
  modalText.innerText="Silmek istediğine emin misin?";
  modal.style.display="flex";
}

function confirmYes(){
  if(deleteType==="normal"){
    data.splice(deleteIndex,1);
    save();
    render();
  } else {
    scaleData.splice(deleteIndex,1);
    saveScale();
    renderScale();
  }
  closeModal();
  msg("Silindi");
}

function closeModal(){
  modal.style.display="none";
}

// ---------------- TERAZİ ----------------
function getPrefix(code){
  return code.length<=3 ? "2700" : "270";
}

function updatePrefix(){
  prefix.value = getPrefix(s_code.value);
}

function openRegister(){
  hideAll();
  register.classList.remove("hidden");
}

function saveScale(){
  let name=s_name.value;
  let code=s_code.value;
  let price=parseFloat(s_price.value);

  if(!name||!code||!price) return msg("Boş bırakma");

  scaleData.push({
    name,
    code,
    fullCode:getPrefix(code)+code,
    price
  });

  saveScale();

  s_name.value="";
  s_code.value="";
  s_price.value="";
  prefix.value="";

  msg("Kaydedildi");
}

function openScaleList(){
  hideAll();
  scaleListPage.classList.remove("hidden");
  renderScale();
}

function renderScale(){
  scaleList.innerHTML="";

  scaleData.forEach((x,i)=>{
    let div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <b>${x.name}</b><br>
      ${x.fullCode}<br>
      ${x.price} ₺<br>

      <button onclick="editScale(${i})">Düzenle</button>
      <button onclick="askDelete(${i},'scale')">Sil</button>
    `;

    scaleList.appendChild(div);
  });
}

function editScale(i){
  let n=prompt("Ad",scaleData[i].name);
  let c=prompt("Kod",scaleData[i].code);
  let p=prompt("Fiyat",scaleData[i].price);

  if(!n||!c||!p) return;

  scaleData[i]={
    name:n,
    code:c,
    fullCode:getPrefix(c)+c,
    price:p
  };

  saveScale();
  renderScale();
  msg("Güncellendi");
}

// ---------------- HESAP ----------------
function openCalc(){
  hideAll();
  calc.classList.remove("hidden");
  result.innerHTML="";
}

function generateBarcode(code,gram){
  return getPrefix(code) + code.padStart(4,"0") + Math.round(gram).toString().padStart(3,"0");
}

function calcScale(){
  let code=c_code.value;
  let gram=parseFloat(c_gram.value);

  if(!code||!gram) return msg("Boş bırakma");

  let p=scaleData.find(x=>x.code==code);
  if(!p) return msg("Ürün yok");

  let total=(gram/1000)*p.price;
  let bar=generateBarcode(code,gram);

  result.innerHTML=`
    <h3>${p.name}</h3>
    <p>${bar}</p>
    <p>${gram} g</p>
    <p>${total.toFixed(2)} ₺</p>
    <svg id="bar"></svg>
  `;

  JsBarcode("#bar",bar);
}

</script>

</body>
</html>
