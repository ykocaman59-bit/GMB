<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB POS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; text-align:center; padding:20px; }
.page { background:white; padding:20px; border-radius:10px; max-width:420px; margin:auto; }
.hidden { display:none; }

input { width:90%; padding:10px; margin:5px; }
button { padding:10px; width:100%; margin:5px 0; }

.item { background:#eee; margin:8px 0; padding:10px; border-radius:8px; }

#msg {
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#222;
color:#fff;
padding:10px 20px;
border-radius:8px;
display:none;
}

#modal {
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

#modalBox{
background:white;
padding:20px;
border-radius:10px;
width:80%;
max-width:300px;
}
</style>
</head>

<body>

<!-- ANA -->
<div id="home" class="page">
<h2>📦 GMB POS</h2>

<input id="barcode" placeholder="Barkod">
<input id="name" placeholder="Ürün adı">

<button onclick="addProduct()">Kaydet</button>
<button onclick="openList()">Liste</button>
<button onclick="openScaleMenu()">⚖️ Terazi</button>
</div>

<!-- LİSTE -->
<div id="listPage" class="page hidden">
<h2>📋 Liste</h2>
<button onclick="goHome()">← Geri</button>
<div id="list"></div>
</div>

<!-- TERAZİ MENÜ -->
<div id="scaleMenu" class="page hidden">
<h2>⚖️ Terazi</h2>
<button onclick="openScaleRegister()">📦 Kayıt</button>
<button onclick="openScaleList()">📋 Liste</button>
<button onclick="goHome()">← Geri</button>
</div>

<!-- TERAZİ KAYIT -->
<div id="scaleRegister" class="page hidden">
<h3>📦 Terazi Kayıt</h3>

<input id="s_name" placeholder="Ürün adı">
<input id="s_code" placeholder="Kod">
<input id="s_price" placeholder="Kg fiyatı">

<button onclick="saveScale()">Kaydet</button>
<button onclick="openScaleMenu()">← Geri</button>
</div>

<!-- TERAZİ LİSTE -->
<div id="scaleListPage" class="page hidden">
<h3>📋 Terazi Listesi</h3>
<button onclick="openScaleMenu()">← Geri</button>
<div id="scaleList"></div>
</div>

<!-- MESAJ -->
<div id="msg"></div>

<!-- MODAL -->
<div id="modal">
  <div id="modalBox">
    <p id="modalText">Silinsin mi?</p>
    <button onclick="confirmDelete()">Evet</button>
    <button onclick="closeModal()">Hayır</button>
  </div>
</div>

<script>

// ---------------- DATA ----------------
let products = JSON.parse(localStorage.getItem("products")) || [];
let scales = JSON.parse(localStorage.getItem("scales")) || [];

let delIndex = null;
let delType = null;

// ---------------- SAVE ----------------
function saveProducts(){
  localStorage.setItem("products", JSON.stringify(products));
}

function saveScales(){
  localStorage.setItem("scales", JSON.stringify(scales));
}

// ---------------- MESSAGE ----------------
function msg(t){
  let m=document.getElementById("msg");
  m.innerText=t;
  m.style.display="block";
  setTimeout(()=>m.style.display="none",2000);
}

// ---------------- NAV ----------------
function hideAll(){
  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
}

function goHome(){
  hideAll();
  home.classList.remove("hidden");
}

// ---------------- NORMAL PRODUCT ----------------
function addProduct(){
  let code = barcode.value.trim();
  let name = document.getElementById("name").value.trim();

  if(!code || !name) return msg("Boş bırakma");

  if(products.some(p=>p.code===code)) return msg("Bu barkod zaten var");

  products.push({code,name});
  saveProducts();

  barcode.value="";
  name.value="";

  msg("Ürün eklendi");
}

// ---------------- LIST ----------------
function openList(){
  hideAll();
  listPage.classList.remove("hidden");
  renderProducts();
}

function renderProducts(){
  list.innerHTML="";

  products.forEach((p,i)=>{
    let b=document.createElement("button");
    b.textContent=p.name;
    b.onclick=()=>showProduct(i);
    list.appendChild(b);
  });
}

function showProduct(i){
  let p=products[i];

  list.innerHTML=`
    <svg id="bc"></svg>
    <p>${p.code}</p>
    <p>${p.name}</p>

    <button onclick="askDelete(${i},'product')">Sil</button>
    <button onclick="renderProducts()">←</button>
  `;

  JsBarcode("#bc", p.code);
}

// ---------------- DELETE MODAL ----------------
function askDelete(i,type){
  delIndex=i;
  delType=type;
  modal.style.display="flex";
}

function confirmDelete(){
  if(delType==="product"){
    products.splice(delIndex,1);
    saveProducts();
    renderProducts();
  } else {
    scales.splice(delIndex,1);
    saveScales();
    renderScales();
  }

  closeModal();
  msg("Silindi");
}

function closeModal(){
  modal.style.display="none";
}

// ---------------- SCALE ----------------
function openScaleMenu(){
  hideAll();
  scaleMenu.classList.remove("hidden");
}

function openScaleRegister(){
  hideAll();
  scaleRegister.classList.remove("hidden");
}

// PREFIX RULE
function prefix(code){
  return code.length<=3 ? "2700" : "270";
}

// ---------------- SCALE SAVE ----------------
function saveScale(){
  let name=s_name.value.trim();
  let code=s_code.value.trim();
  let price=parseFloat(s_price.value);

  if(!name||!code||!price) return msg("Boş bırakma");

  if(scales.some(s=>s.code===code)) return msg("Zaten kayıtlı");

  scales.push({
    name,
    code,
    full: prefix(code)+code,
    price
  });

  saveScales();

  s_name.value="";
  s_code.value="";
  s_price.value="";

  msg("Kaydedildi");
}

// ---------------- SCALE LIST ----------------
function openScaleList(){
  hideAll();
  scaleListPage.classList.remove("hidden");
  renderScales();
}

function renderScales(){
  scaleList.innerHTML="";

  scales.forEach((s,i)=>{
    let d=document.createElement("div");
    d.className="item";

    d.innerHTML=`
      <b>${s.name}</b><br>
      ${s.code}<br>
      ${s.price} ₺<br>

      <button onclick="askDelete(${i},'scale')">Sil</button>
    `;

    scaleList.appendChild(d);
  });
}

</script>

</body>
</html>
