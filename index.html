<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB</title><script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script><style>
body { font-family: Arial; background:#f4f4f4; text-align:center; padding:20px; }
.page { background:white; padding:20px; border-radius:10px; max-width:420px; margin:auto; }
.hidden { display:none; }
input { width:90%; padding:10px; margin:5px; }
button { padding:10px; width:100%; margin:5px 0; }
.item { background:#eee; margin:8px 0; padding:10px; border-radius:8px; }
#popup {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);}
#popupBox {background:white; padding:20px; margin:60% auto; width:80%; border-radius:10px;}
</style></head><body><!-- ANA --><div id="home" class="page">
<h2>📦 GMB</h2><input id="barcode" placeholder="Barkod">
<input id="name" placeholder="Ürün adı"><button onclick="add()">Kaydet</button> <button onclick="showList()">Liste</button> <button onclick="showScale()">⚖️ Terazi</button>

</div><!-- NORMAL LİSTE --><div id="list" class="page hidden">
<h2>📋 Liste</h2>
<button onclick="backHome()">← Geri</button>
<div id="items"></div>
</div><!-- TERAZİ MENÜ --><div id="scaleMenu" class="page hidden">
<h2>⚖️ Terazi</h2>
<button onclick="openScaleRegister()">📦 Ürün Kayıt</button>
<button onclick="openScaleCalc()">🧮 Hesaplama</button>
<button onclick="backHome()">← Geri</button>
</div><!-- TERAZİ KAYIT --><div id="scaleRegister" class="page hidden">
<h3>📦 Ürün Kayıt</h3><input id="s_name" placeholder="Ürün adı">
<input id="s_code" placeholder="Ürün kodu">
<input id="s_price" placeholder="Kg fiyatı"><button onclick="saveScale()">Kaydet</button> <button onclick="showScale()">← Geri</button>

<div id="scaleList"></div>
</div><!-- HESAPLAMA --><div id="scaleCalc" class="page hidden">
<h3>🧮 Hesaplama</h3><input id="c_code" placeholder="Ürün kodu">
<input id="c_gram" placeholder="Gramaj"><button onclick="calcScale()">Hesapla</button> <button onclick="showScale()">← Geri</button>

<div id="result"></div>
</div><!-- POPUP --><div id="popup">
  <div id="popupBox">
    <p id="popupText"></p>
    <button onclick="closePopup()">Tamam</button>
  </div>
</div><script>

let data = JSON.parse(localStorage.getItem("gmb")) || [];
let scaleData = JSON.parse(localStorage.getItem("scale")) || [];

function save(){ localStorage.setItem("gmb", JSON.stringify(data)); }
function saveScale(){ localStorage.setItem("scale", JSON.stringify(scaleData)); }

function showPopup(t){ popupText.innerText = t; popup.style.display="block"; }
function closePopup(){ popup.style.display="none"; }

/* NORMAL EKLE */
function add(){
  let code = barcode.value;
  let name = document.getElementById("name").value;

  if(!code || !name) return showPopup("Boş bırakma");

  data.push({code,name});
  save();

  showPopup("Eklendi");

  barcode.value="";
  document.getElementById("name").value="";
}

/* SAYFA GEÇİŞ */
function showList(){
  home.classList.add("hidden");
  list.classList.remove("hidden");
  render();
}

function showScale(){
  home.classList.add("hidden");
  scaleMenu.classList.remove("hidden");
}

function backHome(){
  list.classList.add("hidden");
  scaleMenu.classList.add("hidden");
  scaleRegister.classList.add("hidden");
  scaleCalc.classList.add("hidden");
  home.classList.remove("hidden");
}

function openScaleRegister(){
  scaleMenu.classList.add("hidden");
  scaleRegister.classList.remove("hidden");
  renderScale();
}

function openScaleCalc(){
  scaleMenu.classList.add("hidden");
  scaleCalc.classList.remove("hidden");
}

/* NORMAL LİSTE */
function render(){
  items.innerHTML="";
  data.forEach(x=>{
    let b=document.createElement("button");
    b.textContent=x.name;
    items.appendChild(b);
  });
}

/* TERAZİ */
function getPrefix(code){
  return code.length<=3 ? "2700" : "270";
}

function saveScale(){

  let name = s_name.value;
  let code = s_code.value;
  let price = s_price.value;

  if(!name || !code || !price) return showPopup("Boş bırakma");

  let fullCode = getPrefix(code) + code;

  scaleData.push({name, code, fullCode, price});
  saveScale();

  showPopup("Kaydedildi");

  s_name.value="";
  s_code.value="";
  s_price.value="";

  renderScale();
}

function renderScale(){
  scaleList.innerHTML="";

  scaleData.forEach(x=>{
    let div=document.createElement("div");
    div.className="item";
    div.innerHTML=`${x.name}<br>${x.fullCode}<br>${x.price} ₺`;
    scaleList.appendChild(div);
  });
}

/* HESAPLAMA */
function calcScale(){

  let code = c_code.value;
  let gram = parseFloat(c_gram.value);

  if(!code || !gram) return showPopup("Boş bırakma");

  let product = scaleData.find(p=>p.code==code);

  if(!product) return showPopup("Ürün yok");

  let total = (gram/1000)*product.price;

  result.innerHTML = `
    <h3>${product.name}</h3>
    <p>Barkod: ${product.fullCode}</p>
    <p>Gramaj: ${gram}</p>
    <p>Tutar: ${total.toFixed(2)} ₺</p>
    <svg id="bar"></svg>
  `;

  JsBarcode("#bar", product.fullCode);
}

</script></body>
</html>
