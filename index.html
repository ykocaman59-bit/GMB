<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMBAPP</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; text-align:center; }
.page { background:white; padding:20px; border-radius:10px; max-width:420px; margin:20px auto; }
.hidden { display:none; }
input { width:90%; padding:10px; margin:5px; }
button { padding:10px; width:100%; margin:5px 0; }
.item { background:#eee; margin:10px 0; padding:10px; border-radius:8px; }

#popup {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);}
#popupBox {background:white; padding:20px; margin:60% auto; width:80%; border-radius:10px;}
</style>
</head>

<body>

<div id="home" class="page">
<h2>GMBAPP</h2>

<input id="barcode" placeholder="Barkod">
<input id="name" placeholder="Ürün adı">

<button onclick="add()">Kaydet</button>
<button onclick="showList()">Liste</button>
<button onclick="showScale()">⚖️ Terazi</button>
</div>

<div id="list" class="page hidden">
<button onclick="back()">←</button>
<div id="items"></div>
</div>

<div id="scaleMenu" class="page hidden">
<button onclick="openRegister()">Ürün Kayıt</button>
<button onclick="openScaleList()">Kod Listesi</button>
<button onclick="openCalc()">Hesapla</button>
<button onclick="back()">←</button>
</div>

<div id="register" class="page hidden">
<p id="prefixText">2700</p>
<input id="s_name" placeholder="Ürün adı">
<input id="s_code" placeholder="Kod">
<input id="s_price" placeholder="Kg fiyatı">
<button onclick="saveScale()">Kaydet</button>
<button onclick="showScale()">←</button>
</div>

<div id="scaleListPage" class="page hidden">
<button onclick="showScale()">←</button>
<div id="scaleList"></div>
</div>

<div id="calc" class="page hidden">
<input id="c_code" placeholder="Kod">
<input id="c_gram" placeholder="Gram (0,517 gibi)">
<button onclick="calcScale()">Hesapla</button>
<button onclick="showScale()">←</button>
<div id="result"></div>
</div>

<!-- POPUP -->
<div id="popup">
  <div id="popupBox">
    <p id="popupText"></p>
    <div id="popupButtons"></div>
  </div>
</div>

<script>

// DATA
let data = JSON.parse(localStorage.getItem("gmb")) || [];
let scaleData = JSON.parse(localStorage.getItem("scale")) || [];

function save(){ localStorage.setItem("gmb", JSON.stringify(data)); }
function saveScaleData(){ localStorage.setItem("scale", JSON.stringify(scaleData)); }

// POPUP
function showPopup(text){
  popupText.innerText = text;
  popupButtons.innerHTML = `<button onclick="closePopup()">Tamam</button>`;
  popup.style.display="block";
}

function showConfirm(text, yesFn){
  popupText.innerText = text;
  popupButtons.innerHTML = `
    <button onclick="confirmYes()">Evet</button>
    <button onclick="closePopup()">Hayır</button>
  `;
  popup.style.display="block";
  window.confirmAction = yesFn;
}

function confirmYes(){
  popup.style.display="none";
  if(window.confirmAction) window.confirmAction();
}

function closePopup(){
  popup.style.display="none";
}

// NAV
function hideAll(){ document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden")); }
function back(){ hideAll(); home.classList.remove("hidden"); }

// NORMAL KAYIT
function add(){
  let code=barcode.value.trim();
  let name=document.getElementById("name").value.trim();

  if(!code||!name) return showPopup("Boş bırakma");
  if(data.some(x=>x.code===code)) return showPopup("Zaten var");

  data.push({code,name});
  save();

  barcode.value="";
  document.getElementById("name").value="";

  showPopup("Eklendi");
}

// LİSTE
function showList(){
  hideAll();
  list.classList.remove("hidden");
  render();
}

function render(){
  items.innerHTML="";
  data.forEach((x,i)=>{
    let b=document.createElement("button");
    b.textContent=x.name;
    b.onclick=()=>detail(i);
    items.appendChild(b);
  });
}

function detail(i){
  let x=data[i];

  items.innerHTML=`
    <svg id="b"></svg>
    <p>${x.code}</p>
    <p>${x.name}</p>

    <button onclick="editItem(${i})">Düzenle</button>
    <button onclick="deleteItem(${i})">Sil</button>
    <button onclick="render()">←</button>
  `;

  JsBarcode("#b", x.code);
}

// SİL
function deleteItem(i){
  showConfirm("Silmek istediğinize emin misiniz?", ()=>{
    data.splice(i,1);
    save();
    render();
    showPopup("Silindi");
  });
}

// DÜZENLE
function editItem(i){
  let x=data[i];

  items.innerHTML=`
    <input id="e_code" value="${x.code}">
    <input id="e_name" value="${x.name}">
    <button onclick="saveEdit(${i})">Kaydet</button>
    <button onclick="render()">İptal</button>
  `;
}

function saveEdit(i){
  let code=document.getElementById("e_code").value;
  let name=document.getElementById("e_name").value;

  if(!code||!name) return showPopup("Boş bırakma");

  data[i]={code,name};
  save();
  render();

  showPopup("Güncellendi");
}

// TERAZİ
function showScale(){ hideAll(); scaleMenu.classList.remove("hidden"); }
function openRegister(){ hideAll(); register.classList.remove("hidden"); }

function getPrefix(code){
  return code.length<=3 ? "2700" : "270";
}

s_code.addEventListener("input", ()=>{
  prefixText.innerText = s_code.value.length<=3 ? "2700" : "270";
});

// TERAZİ KAYDET
function saveScale(){
  let name=s_name.value.trim();
  let code=s_code.value.trim();
  let price=parseFloat(s_price.value.replace(",","."));

  if(!name||!code||!price) return showPopup("Boş bırakma");
  if(scaleData.some(x=>x.code===code)) return showPopup("Zaten kayıtlı");

  scaleData.push({name,code,price,plu:getPrefix(code)+code});
  saveScaleData();

  s_name.value="";
  s_code.value="";
  s_price.value="";

  showPopup("Kaydedildi");
}

// TERAZİ LİSTE
function openScaleList(){
  hideAll();
  scaleListPage.classList.remove("hidden");
  renderScale();
}

function renderScale(){
  scaleList.innerHTML="";

  scaleData.forEach((x,i)=>{
    scaleList.innerHTML+=`
      <div class="item">
        <b>${x.name}</b><br>
        PLU: ${x.plu}<br>
        ${x.price.toFixed(2)} ₺<br>

        <button onclick="editScale(${i})">Düzenle</button>
        <button onclick="deleteScale(${i})">Sil</button>
      </div>
    `;
  });
}

// TERAZİ SİL
function deleteScale(i){
  showConfirm("Silmek istediğinize emin misiniz?", ()=>{
    scaleData.splice(i,1);
    saveScaleData();
    renderScale();
    showPopup("Silindi");
  });
}

// TERAZİ DÜZENLE
function editScale(i){
  let x=scaleData[i];

  scaleList.innerHTML=`
    <input id="es_name" value="${x.name}">
    <input id="es_code" value="${x.code}">
    <input id="es_price" value="${x.price}">

    <button onclick="saveEditScale(${i})">Kaydet</button>
    <button onclick="renderScale()">İptal</button>
  `;
}

function saveEditScale(i){
  let name=document.getElementById("es_name").value;
  let code=document.getElementById("es_code").value;
  let price=parseFloat(document.getElementById("es_price").value.replace(",","."));

  if(!name||!code||!price) return showPopup("Boş bırakma");

  scaleData[i]={name,code,price,plu:getPrefix(code)+code};

  saveScaleData();
  renderScale();

  showPopup("Güncellendi");
}

// HESAPLA
function openCalc(){
  hideAll();
  calc.classList.remove("hidden");
  result.innerHTML="";
}

function calcScale(){
  let code=c_code.value.trim();
  let gram=parseFloat(c_gram.value.replace(",","."));

  if(!code||!gram) return showPopup("Boş bırakma");

  let p=scaleData.find(x=>x.code==code);
  if(!p) return showPopup("Ürün yok");

  let prefix=getPrefix(code);

  let gramInt=Math.round(gram*1000);
  let gramStr=gramInt.toString().padStart(5,"0");

  let base=prefix+code+gramStr;

  let sum=0;
  for(let i=0;i<base.length;i++){
    sum+=(i%2==0 ? base[i]*1 : base[i]*3);
  }
  let check=(10-(sum%10))%10;

  let barcode=base+check;
  let total=gram*p.price;

  result.innerHTML=`
    <h3>${p.name}</h3>
    <p>${total.toFixed(2)} ₺</p>
    <p>${barcode}</p>
    <svg id="bar"></svg>
  `;

  JsBarcode("#bar", barcode);
}

</script>

</body>
</html>
