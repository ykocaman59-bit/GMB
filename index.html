<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; text-align:center; padding:20px; }
.page { background:white; padding:20px; border-radius:10px; max-width:400px; margin:auto; }
.hidden { display:none; }
input { width:90%; padding:10px; margin:5px; }
button { padding:10px; width:100%; margin:5px 0; }
.item { background:#fff; margin:10px 0; padding:10px; border-radius:8px; }

#popup {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);}
#popupBox {background:white; padding:20px; margin:60% auto; width:80%; border-radius:10px;}
</style>
</head>

<body>

<!-- ANA -->
<div id="home" class="page">
<h2>📦 GMB</h2>

<input id="barcode" placeholder="Barkod">
<input id="name" placeholder="Ürün adı">

<button onclick="add()">Kaydet</button>
<button onclick="showList()">Liste</button>
<button onclick="showScale()">⚖️ Terazi</button>
</div>

<!-- LİSTE -->
<div id="list" class="page hidden">
<h2>📋 Liste</h2>
<button onclick="back()">← Geri</button>
<div id="items"></div>
</div>

<!-- TERAZİ -->
<div id="scale" class="page hidden">
<h2>⚖️ Terazi</h2>

<input id="s_name" placeholder="Ürün adı">
<input id="s_price" placeholder="Kg fiyatı">
<input id="s_code" placeholder="Kod (3-4 hane)">
<input id="s_gram" placeholder="Gramaj">

<button onclick="calc()">Hesapla</button>
<button onclick="back()">← Geri</button>

<div id="result"></div>
</div>

<!-- POPUP -->
<div id="popup">
  <div id="popupBox">
    <p id="popupText"></p>
    <button onclick="closePopup()">Tamam</button>
  </div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("gmb")) || [];

function save(){ localStorage.setItem("gmb", JSON.stringify(data)); }

function showPopup(t){
  popupText.innerText = t;
  popup.style.display = "block";
}
function closePopup(){ popup.style.display="none"; }

/* ANA EKLE */
function add(){
  let code = barcode.value;
  let name = nameInput = document.getElementById("name").value;

  if(!code || !name) return showPopup("Boş bırakma");

  if(data.find(x=>x.code===code)) return showPopup("Zaten var");

  data.push({code,name});
  save();

  showPopup("Eklendi");

  barcode.value="";
  document.getElementById("name").value="";
}

/* SAYFA */
function showList(){
  home.classList.add("hidden");
  list.classList.remove("hidden");
  render();
}
function showScale(){
  home.classList.add("hidden");
  scale.classList.remove("hidden");
}
function back(){
  list.classList.add("hidden");
  scale.classList.add("hidden");
  home.classList.remove("hidden");
}

/* LİSTE */
function render(){
  items.innerHTML="";
  data.forEach((x,i)=>{
    let b=document.createElement("button");
    b.textContent=x.name;
    b.onclick=()=>detail(i);
    items.appendChild(b);
  });
}

function detail(i){
  let x=data[i];
  items.innerHTML=`
  <svg id="b"></svg>
  <p>${x.code} - ${x.name}</p>
  <button onclick="del(${i})">Sil</button>
  <button onclick="render()">←</button>
  `;
  JsBarcode("#b", x.code);
}

function del(i){
  if(confirm("Silinsin mi?")){
    data.splice(i,1);
    save();
    render();
  }
}

/* TERAZİ HESAP */
function calc(){
  let name=s_name.value;
  let price=parseFloat(s_price.value);
  let code=s_code.value;
  let gram=parseFloat(s_gram.value);

  if(!name||!price||!code||!gram) return showPopup("Boş bırakma");

  let fullCode;

  if(code.length==3) fullCode="2700"+code;
  else if(code.length==4) fullCode="270"+code;
  else return showPopup("Kod 3 veya 4 haneli olmalı");

  let total=(gram/1000)*price;

  result.innerHTML=`
    <p>${name}</p>
    <p>Kod: ${fullCode}</p>
    <p>Tutar: ${total.toFixed(2)} ₺</p>
    <svg id="bar"></svg>
  `;

  JsBarcode("#bar", fullCode);
}

</script>

</body>
</html>
