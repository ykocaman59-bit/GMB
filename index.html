<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB Barkod Sistemi</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; text-align:center; padding:20px; }
.page { background:white; padding:20px; border-radius:10px; max-width:400px; margin:auto; }
.hidden { display:none; }
input { width:90%; padding:10px; margin:5px; }
button { padding:10px; width:100%; margin:5px 0; cursor:pointer; }
.item { background:#fff; margin:10px 0; padding:10px; border-radius:8px; }

/* POPUP */
#popup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
}
#popupBox {
  background:white;
  padding:20px;
  border-radius:10px;
  width:80%;
  margin:50% auto;
}
</style>
</head>

<body>

<div id="home" class="page">
<h2>📦 GMB Barkod Sistemi</h2>

<input id="barcode" placeholder="Barkod">
<input id="name" placeholder="Ürün adı">

<button onclick="add()">Kaydet</button>
<button onclick="showList()">Liste</button>
</div>

<div id="list" class="page hidden">
<h2>📋 Liste</h2>
<input id="search" placeholder="Ara..." oninput="render()">
<button onclick="back()">← Geri</button>
<div id="items"></div>
</div>

<!-- POPUP -->
<div id="popup">
  <div id="popupBox">
    <p id="popupTitle"></p>
    <div id="popupContent"></div>
  </div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("gmb")) || [];
let selectedIndex = null;

function save() {
  localStorage.setItem("gmb", JSON.stringify(data));
}

/* POPUP GENEL */
function openPopup(title, contentHTML){
  document.getElementById("popupTitle").innerText = title;
  document.getElementById("popupContent").innerHTML = contentHTML;
  document.getElementById("popup").style.display = "block";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

/* EKLE */
function add() {
  const code = barcode.value;
  const name = document.getElementById("name").value;

  if(!code || !name) return openPopup("Uyarı","<p>Boş alan bırakma</p><button onclick='closePopup()'>Tamam</button>");

  if(data.find(x => x.code === code))
    return openPopup("Uyarı","<p>Bu barkod zaten kayıtlı</p><button onclick='closePopup()'>Tamam</button>");

  data.push({code, name});
  save();

  openPopup("Başarılı","<p>Kayıt eklendi</p><button onclick='closePopup()'>Tamam</button>");

  barcode.value = "";
  document.getElementById("name").value = "";
}

/* SAYFA */
function showList() {
  home.classList.add("hidden");
  list.classList.remove("hidden");
  render();
}
function back() {
  list.classList.add("hidden");
  home.classList.remove("hidden");
}

/* LİSTE */
function render() {
  const q = search.value.toLowerCase();
  items.innerHTML = "";

  data.filter(x => x.name.toLowerCase().includes(q))
  .forEach((item,i)=>{
    const btn = document.createElement("button");
    btn.textContent = item.name;
    btn.onclick = () => showDetail(i);
    items.appendChild(btn);
  });
}

/* DETAY */
function showDetail(i){
  const item = data[i];
  items.innerHTML = "";

  const id = "b"+i;

  items.innerHTML = `
    <div class="item">
      <svg id="${id}"></svg>
      <p>${item.code} - ${item.name}</p>
      <button onclick="askDelete(${i})">Sil</button>
      <button onclick="openEdit(${i})">Düzenle</button>
      <button onclick="render()">← Listeye Dön</button>
    </div>
  `;

  JsBarcode("#"+id, item.code, {displayValue:false});
}

/* SİL */
function askDelete(i){
  selectedIndex = i;
  openPopup("Silinsin mi?",
    `<button onclick="confirmDelete()">Evet</button>
     <button onclick="closePopup()">Hayır</button>`
  );
}

function confirmDelete(){
  data.splice(selectedIndex,1);
  save();
  closePopup();
  render();
}

/* DÜZENLE */
function openEdit(i){
  selectedIndex = i;

  openPopup("Düzenleme Paneli",
    `<input id="editInput" value="${data[i].name}">
     <button onclick="saveEdit()">Kaydet</button>
     <button onclick="closePopup()">İptal</button>`
  );
}

function saveEdit(){
  const newName = document.getElementById("editInput").value;

  if(newName){
    data[selectedIndex].name = newName;
    save();
    closePopup();
    render();
  }
}

</script>

</body>
</html>
