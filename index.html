<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB Barkod Sistemi</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; text-align:center; padding:20px; }
.page { background:white; padding:20px; border-radius:10px; max-width:400px; margin:auto; }
.hidden { display:none; }
input { width:90%; padding:10px; margin:5px; }
button { padding:10px; width:100%; margin:5px 0; cursor:pointer; }
.item { background:#fff; margin:10px 0; padding:10px; border-radius:8px; }

/* Popup */
#popup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
}
#popupBox {
  background:white;
  padding:20px;
  border-radius:10px;
  width:80%;
  margin:60% auto;
}
</style>
</head>

<body>

<div id="home" class="page">
<h2>📦 GMB Barkod Sistemi</h2>

<input id="barcode" placeholder="Barkod">
<input id="name" placeholder="Ürün adı">

<button onclick="add()">Kaydet</button>
<button onclick="showList()">Liste</button>

</div>

<div id="list" class="page hidden">
<h2>📋 Liste</h2>
<input id="search" placeholder="Ara..." oninput="render()">
<button onclick="back()">← Geri</button>

<div id="items"></div>
</div>

<!-- POPUP -->
<div id="popup">
  <div id="popupBox">
    <p id="popupText"></p>
    <button onclick="closePopup()">Tamam</button>
  </div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("gmb")) || [];

function save() {
  localStorage.setItem("gmb", JSON.stringify(data));
}

/* POPUP */
function showPopup(text){
  document.getElementById("popupText").innerText = text;
  document.getElementById("popup").style.display = "block";
}
function closePopup(){
  document.getElementById("popup").style.display = "none";
}

/* EKLE */
function add() {
  const barcodeInput = document.getElementById("barcode");
  const nameInput = document.getElementById("name");

  const code = barcodeInput.value;
  const name = nameInput.value;

  if(!code || !name) return showPopup("Boş alan bırakma");

  if(data.find(x => x.code === code))
    return showPopup("Bu barkod zaten kayıtlı");

  data.push({code, name});
  save();

  showPopup("Kayıt eklendi");

  barcodeInput.value = "";
  nameInput.value = "";
}

/* SAYFA GEÇİŞ */
function showList() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("list").classList.remove("hidden");
  render();
}
function back() {
  document.getElementById("list").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

/* LİSTE */
function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const div = document.getElementById("items");
  div.innerHTML = "";

  data.filter(x => x.name.toLowerCase().includes(q))
  .forEach((item,i)=>{
    const btn = document.createElement("button");
    btn.textContent = item.name;
    btn.onclick = () => showDetail(i);
    div.appendChild(btn);
  });
}

/* DETAY */
function showDetail(i){
  const div = document.getElementById("items");
  const item = data[i];

  div.innerHTML = "";

  const el = document.createElement("div");
  el.className = "item";

  const id = "b"+i;

  el.innerHTML = `
    <svg id="${id}"></svg>
    <p>${item.code} - ${item.name}</p>
    <button onclick="del(${i})">Sil</button>
    <button onclick="edit(${i})">Düzenle</button>
    <button onclick="render()">← Listeye Dön</button>
  `;

  div.appendChild(el);

  JsBarcode("#"+id, item.code, {displayValue:false});
}

/* SİL */
function del(i){
  if(confirm("Silinsin mi?")){
    data.splice(i,1);
    save();
    render();
  }
}

/* DÜZENLE */
function edit(i){
  const name = prompt("Yeni isim:", data[i].name);
  if(name){
    data[i].name=name;
    save();
    render();
    showPopup("Düzenlendi");
  }
}

</script>

</body>
</html>
