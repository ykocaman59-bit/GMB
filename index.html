<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB Barkod Sistemi</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; text-align:center; padding:20px; }
.page { background:white; padding:20px; border-radius:10px; max-width:400px; margin:auto; }
.hidden { display:none; }
input { width:90%; padding:10px; margin:5px; }
button { padding:10px; width:100%; margin:5px 0; cursor:pointer; }
.item { background:#fff; margin:10px 0; padding:10px; border-radius:8px; }
</style>
</head>

<body>

<div id="home" class="page">
<h2>📦 GMB Barkod Sistemi</h2>

<input id="barcode" placeholder="Barkod">
<input id="name" placeholder="Ürün adı">

<button onclick="add()">Kaydet</button>
<button onclick="showList()">Liste</button>
<button onclick="exportData()">Yedek Al</button>
<input type="file" onchange="importData(event)">

</div>

<div id="list" class="page hidden">
<h2>📋 Liste</h2>
<input id="search" placeholder="Ara..." oninput="render()">
<button onclick="back()">← Geri</button>

<div id="items"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("gmb")) || [];

function save() {
  localStorage.setItem("gmb", JSON.stringify(data));
}

function add() {
  const barcodeInput = document.getElementById("barcode");
  const nameInput = document.getElementById("name");

  const code = barcodeInput.value;
  const name = nameInput.value;

  if(!code || !name) return alert("Boş bırakma");

  if(data.find(x => x.code === code))
    return alert("Bu barkod zaten var!");

  data.push({code, name});
  save();
  alert("Eklendi");

  // ✅ EKLEME: inputları temizle
  barcodeInput.value = "";
  nameInput.value = "";
}

function showList() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("list").classList.remove("hidden");
  render();
}

function back() {
  document.getElementById("list").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

// ✅ YENİ: sadece isimleri buton olarak göster
function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const div = document.getElementById("items");
  div.innerHTML = "";

  data.filter(x => x.name.toLowerCase().includes(q))
  .forEach((item,i)=>{
    const btn = document.createElement("button");
    btn.textContent = item.name;
    btn.onclick = () => showDetail(i);
    div.appendChild(btn);
  });
}

// ✅ YENİ: detay ekranı (senin eski görünümün)
function showDetail(i){
  const div = document.getElementById("items");
  const item = data[i];

  div.innerHTML = "";

  const el = document.createElement("div");
  el.className = "item";

  const id = "b"+i;

  el.innerHTML = `
    <svg id="${id}"></svg>
    <p>${item.code} - ${item.name}</p>
    <button onclick="del(${i})">Sil</button>
    <button onclick="edit(${i})">Düzenle</button>
    <button onclick="render()">← Listeye Dön</button>
  `;

  div.appendChild(el);

  JsBarcode("#"+id, item.code, {displayValue:false});
}

function del(i){
  if(confirm("Silinsin mi?")){
    data.splice(i,1);
    save();
    render();
  }
}

function edit(i){
  const name = prompt("Yeni isim:", data[i].name);
  if(name){
    data[i].name=name;
    save();
    render();
  }
}

function exportData(){
  const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "gmb.json";
  a.click();
}

function importData(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = () => {
    data = JSON.parse(reader.result);
    save();
    alert("Yüklendi");
  };

  reader.readAsText(file);
}

</script>

</body>
</html>
