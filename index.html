<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB - Terazi Sistem</title><script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script><style>
body { font-family: Arial; background:#f4f4f4; text-align:center; padding:20px; }
.page { background:white; padding:20px; border-radius:10px; max-width:420px; margin:auto; }
.hidden { display:none; }
input { width:90%; padding:10px; margin:5px; }
button { padding:10px; width:100%; margin:5px 0; }
.item { background:#eee; margin:8px 0; padding:10px; border-radius:8px; }
#popup {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);}
#popupBox {background:white; padding:20px; margin:60% auto; width:80%; border-radius:10px;}
</style></head><body><!-- ANA --><div id="home" class="page">
<h2>📦 GMB</h2><button onclick="openScale()">⚖️ Terazi Sistemi</button>

</div><!-- TERAZİ MENÜ --><div id="scaleMenu" class="page hidden">
<h2>⚖️ Terazi</h2>
<button onclick="openRegister()">📦 Ürün Kayıt</button>
<button onclick="openCalc()">🧮 Hesaplama</button>
<button onclick="backHome()">← Geri</button>
</div><!-- KAYIT --><div id="register" class="page hidden">
<h3>📦 Ürün Kayıt</h3><input id="p_name" placeholder="Ürün adı">
<input id="p_code" placeholder="Ürün kodu (örn: 163)">
<input id="p_price" placeholder="Kg fiyatı"><button onclick="saveProduct()">Kaydet</button> <button onclick="openScale()">← Geri</button>

<div id="productList"></div>
</div><!-- HESAPLAMA --><div id="calc" class="page hidden">
<h3>🧮 Hesaplama</h3><input id="c_code" placeholder="Ürün kodu">
<input id="c_gram" placeholder="Gramaj (örn: 171)"><button onclick="calculate()">Hesapla</button> <button onclick="openScale()">← Geri</button>

<div id="result"></div>
</div><!-- POPUP --><div id="popup">
  <div id="popupBox">
    <p id="popupText"></p>
    <button onclick="closePopup()">Tamam</button>
  </div>
</div><script>

let products = JSON.parse(localStorage.getItem("products")) || [];

function saveData(){
  localStorage.setItem("products", JSON.stringify(products));
}

function showPopup(t){
  popupText.innerText = t;
  popup.style.display = "block";
}
function closePopup(){ popup.style.display="none"; }

function openScale(){
  home.classList.add("hidden");
  scaleMenu.classList.remove("hidden");
  register.classList.add("hidden");
  calc.classList.add("hidden");
}

function backHome(){
  scaleMenu.classList.add("hidden");
  home.classList.remove("hidden");
}

function openRegister(){
  scaleMenu.classList.add("hidden");
  register.classList.remove("hidden");
  renderList();
}

function openCalc(){
  scaleMenu.classList.add("hidden");
  calc.classList.remove("hidden");
}

function getBarcode(code){
  return "2700" + code.toString().padStart(4,"0");
}

function saveProduct(){

  let name = p_name.value;
  let code = p_code.value;
  let price = parseFloat(p_price.value);

  if(!name || !code || !price) return showPopup("Boş bırakma");

  products.push({
    name,
    code: code,
    price: price
  });

  saveData();

  p_name.value="";
  p_code.value="";
  p_price.value="";

  showPopup("Ürün kaydedildi");
  renderList();
}

function renderList(){
  productList.innerHTML="";

  products.forEach(p=>{
    let div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <b>${p.name}</b><br>
      Kod: ${getBarcode(p.code)}<br>
      Kg Fiyat: ${p.price} ₺
    `;

    productList.appendChild(div);
  });
}

function calculate(){

  let code = c_code.value;
  let gram = parseFloat(c_gram.value);

  if(!code || !gram) return showPopup("Boş bırakma");

  let product = products.find(p => p.code == code);

  if(!product) return showPopup("Ürün bulunamadı");

  let kg = gram / 1000;
  let total = kg * product.price;

  let barcode = getBarcode(code);

  result.innerHTML = `
    <h3>${product.name}</h3>
    <p>Barkod: ${barcode}</p>
    <p>Gramaj: ${gram}g</p>
    <p>Tutar: ${total.toFixed(2)} ₺</p>
    <svg id="bar"></svg>
  `;

  JsBarcode("#bar", barcode);
}

</script></body>
</html>
