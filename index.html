<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; text-align:center; padding:20px; }
.page { background:white; padding:20px; border-radius:10px; max-width:420px; margin:auto; }
.hidden { display:none; }
input { width:90%; padding:10px; margin:5px; }
button { padding:10px; width:100%; margin:5px 0; }
.item { background:#eee; margin:8px 0; padding:10px; border-radius:8px; }
</style>
</head>

<body>

<div id="home" class="page">
<h2>GMB</h2>

<input id="barcode" placeholder="Barkod">
<input id="name" placeholder="Ürün adı">

<button onclick="add()">Kaydet</button>
<button onclick="showList()">Liste</button>
<button onclick="showScale()">Terazi</button>
</div>

<div id="list" class="page hidden">
<button onclick="back()">← Geri</button>
<div id="items"></div>
</div>

<div id="scaleMenu" class="page hidden">
<button onclick="openRegister()">Ürün Kayıt</button>
<button onclick="openScaleList()">Kod Listesi</button>
<button onclick="back()">← Geri</button>
</div>

<div id="register" class="page hidden">
<input id="s_name" placeholder="Ürün adı">
<input id="s_code" placeholder="Kod">
<input id="s_price" placeholder="Kg fiyatı">
<button onclick="saveScale()">Kaydet</button>
<button onclick="showScale()">←</button>
</div>

<div id="scaleListPage" class="page hidden">
<button onclick="showScale()">←</button>
<div id="scaleList"></div>
</div>

<script>

// 🔴 TEMİZ BAŞLAT (EN ÖNEMLİ)
let data = JSON.parse(localStorage.getItem("gmb")) || [];
let scaleData = JSON.parse(localStorage.getItem("scale")) || [];

// BOZUK VERİLERİ TEMİZLE
scaleData = scaleData.filter(x => x.name && x.code && x.price);
localStorage.setItem("scale", JSON.stringify(scaleData));

// ---------------- ANA ----------------
function add(){
  let code = barcode.value.trim();
  let name = document.getElementById("name").value.trim();

  if(!code || !name) return alert("Boş bırakma");

  if(data.some(x=>x.code===code)) return alert("Bu barkod var");

  data.push({code,name});
  localStorage.setItem("gmb", JSON.stringify(data));

  barcode.value="";
  name.value="";
}

// ---------------- SAYFA ----------------
function showList(){
  home.classList.add("hidden");
  list.classList.remove("hidden");
  render();
}

function showScale(){
  home.classList.add("hidden");
  scaleMenu.classList.remove("hidden");
}

function back(){
  list.classList.add("hidden");
  scaleMenu.classList.add("hidden");
  scaleListPage.classList.add("hidden");
  register.classList.add("hidden");
  home.classList.remove("hidden");
}

// ---------------- LİSTE ----------------
function render(){
  items.innerHTML="";

  data.forEach((x,i)=>{
    let btn=document.createElement("button");
    btn.textContent=x.name;
    btn.onclick=()=>detail(i);
    items.appendChild(btn);
  });
}

function detail(i){
  let x=data[i];

  items.innerHTML=`
    <svg id="b"></svg>
    <p>${x.code}</p>
    <p>${x.name}</p>

    <button onclick="edit(${i})">Düzenle</button>
    <button onclick="del(${i})">Sil</button>
    <button onclick="render()">←</button>
  `;

  JsBarcode("#b", x.code);
}

function edit(i){
  let n=prompt("Ad",data[i].name);
  let c=prompt("Kod",data[i].code);
  if(!n||!c) return;

  data[i]={name:n,code:c};
  localStorage.setItem("gmb", JSON.stringify(data));
  render();
}

function del(i){
  if(confirm("Silmek istiyor musun?")){
    data.splice(i,1);
    localStorage.setItem("gmb", JSON.stringify(data));
    render();
  }
}

// ---------------- TERAZİ ----------------
function openRegister(){
  scaleMenu.classList.add("hidden");
  register.classList.remove("hidden");
}

function getPrefix(code){
  return code.length<=3 ? "2700" : "270";
}

// 🔥 TEK KAYIT FIX
function saveScale(){

  let name=s_name.value.trim();
  let code=s_code.value.trim();
  let price=parseFloat(s_price.value);

  if(!name||!code||!price) return alert("Boş bırakma");

  if(scaleData.some(x=>x.code===code)) return alert("Bu kod var");

  let plu = getPrefix(code)+code;

  scaleData.push({name,code,price,plu});

  localStorage.setItem("scale", JSON.stringify(scaleData));

  s_name.value="";
  s_code.value="";
  s_price.value="";
}

// ---------------- TERAZİ LİSTE ----------------
function openScaleList(){
  scaleMenu.classList.add("hidden");
  scaleListPage.classList.remove("hidden");
  renderScale();
}

function renderScale(){
  scaleList.innerHTML="";

  scaleData.forEach((x,i)=>{

    let div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <b>${x.name}</b><br>
      PLU: ${x.plu}<br>
      ${x.price} ₺<br>

      <button onclick="editScale(${i})">Düzenle</button>
      <button onclick="delScale(${i})">Sil</button>
    `;

    scaleList.appendChild(div);
  });
}

function editScale(i){
  let n=prompt("Ad",scaleData[i].name);
  let c=prompt("Kod",scaleData[i].code);
  let p=prompt("Fiyat",scaleData[i].price);

  if(!n||!c||!p) return;

  scaleData[i]={
    name:n,
    code:c,
    price:p,
    plu:getPrefix(c)+c
  };

  localStorage.setItem("scale", JSON.stringify(scaleData));
  renderScale();
}

function delScale(i){
  if(confirm("Silmek istiyor musun?")){
    scaleData.splice(i,1);
    localStorage.setItem("scale", JSON.stringify(scaleData));
    renderScale();
  }
}

</script>

</body>
</html>
