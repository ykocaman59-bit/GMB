<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMB</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; text-align:center; padding:20px; }
.page { background:white; padding:20px; border-radius:10px; max-width:420px; margin:auto; }
.hidden { display:none; }
input { width:90%; padding:10px; margin:5px; }
button { padding:10px; width:100%; margin:5px 0; }
.item { background:#eee; margin:8px 0; padding:10px; border-radius:8px; }

#msg {
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#222;
color:#fff;
padding:10px 20px;
border-radius:8px;
display:none;
}
</style>
</head>

<body>

<!-- ANA -->
<div id="home" class="page">
<h2>📦 GMB</h2>

<input id="barcode" placeholder="Barkod">
<input id="name" placeholder="Ürün adı">

<button onclick="add()">Kaydet</button>
<button onclick="showList()">Liste</button>
<button onclick="showScale()">⚖️ Terazi</button>
</div>

<!-- NORMAL LİSTE -->
<div id="list" class="page hidden">
<h2>📋 Liste</h2>
<button onclick="goHome()">← Geri</button>
<div id="items"></div>
</div>

<!-- TERAZİ MENÜ -->
<div id="scaleMenu" class="page hidden">
<h2>⚖️ Terazi</h2>
<button onclick="openRegister()">📦 Ürün Kayıt</button>
<button onclick="openScaleList()">📋 Kod Listesi</button>
<button onclick="openCalc()">🧮 Hesaplama</button>
<button onclick="goHome()">← Geri</button>
</div>

<!-- TERAZİ KAYIT -->
<div id="register" class="page hidden">
<h3>📦 Ürün Kayıt</h3>

<input id="s_name" placeholder="Ürün adı">
<input id="s_code" placeholder="Kod" oninput="updatePrefix()">
<input id="prefix" disabled placeholder="Prefix">

<input id="s_price" placeholder="Kg fiyatı">

<button onclick="saveScale()">Kaydet</button>
<button onclick="showScale()">← Geri</button>
</div>

<!-- TERAZİ LİSTE -->
<div id="scaleListPage" class="page hidden">
<h3>📋 Terazi Listesi</h3>
<button onclick="showScale()">← Geri</button>
<div id="scaleList"></div>
</div>

<!-- HESAP -->
<div id="calc" class="page hidden">
<h3>🧮 Hesaplama</h3>

<input id="c_code" placeholder="Kod">
<input id="c_gram" placeholder="Gram">

<button onclick="calcScale()">Hesapla</button>
<button onclick="showScale()">← Geri</button>

<div id="result"></div>
</div>

<div id="msg"></div>

<script>

// DATA
let data = JSON.parse(localStorage.getItem("gmb")) || [];
let scaleData = JSON.parse(localStorage.getItem("scale")) || [];

function save(){ localStorage.setItem("gmb", JSON.stringify(data)); }
function saveScaleData(){ localStorage.setItem("scale", JSON.stringify(scaleData)); }

// MESSAGE
function msg(t){
  let m = document.getElementById("msg");
  m.innerText = t;
  m.style.display = "block";
  setTimeout(()=>m.style.display="none",2000);
}

// PAGE
function hideAll(){
  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
}

function goHome(){
  hideAll();
  home.classList.remove("hidden");
}

function showList(){
  hideAll();
  list.classList.remove("hidden");
  render();
}

function showScale(){
  hideAll();
  scaleMenu.classList.remove("hidden");
}

// NORMAL
function add(){
  let code = barcode.value;
  let name = document.getElementById("name").value;

  if(!code || !name) return msg("Boş bırakma");

  data.push({code,name});
  save();

  barcode.value="";
  name.value="";

  msg("Ürün eklendi");
}

function render(){
  items.innerHTML="";
  data.forEach((x,i)=>{
    let b=document.createElement("button");
    b.textContent=x.name;
    b.onclick=()=>detail(i);
    items.appendChild(b);
  });
}

function detail(i){
  let x=data[i];

  items.innerHTML=`
    <svg id="b"></svg>
    <p>${x.code}</p>
    <p>${x.name}</p>

    <button onclick="edit(${i})">Düzenle</button>
    <button onclick="del(${i})">Sil</button>
    <button onclick="render()">←</button>
  `;

  JsBarcode("#b", x.code);
}

function del(i){
  data.splice(i,1);
  save();
  render();
  msg("Silindi");
}

function edit(i){
  let newName = prompt("Yeni ürün adı", data[i].name);
  let newCode = prompt("Yeni barkod", data[i].code);

  if(!newName || !newCode) return;

  data[i] = {name:newName, code:newCode};
  save();
  render();
  msg("Güncellendi");
}

// TERAZİ
function getPrefix(code){
  if(code.length<=3) return "2700";
  if(code.length==4) return "270";
  return "";
}

function updatePrefix(){
  prefix.value = getPrefix(s_code.value);
}

function openRegister(){
  hideAll();
  register.classList.remove("hidden");
}

function saveScale(){
  let name = s_name.value;
  let code = s_code.value;
  let price = parseFloat(s_price.value);

  if(!name || !code || !price) return msg("Boş bırakma");

  let fullCode = getPrefix(code) + code;

  scaleData.push({name, code, fullCode, price});
  saveScaleData();

  s_name.value="";
  s_code.value="";
  s_price.value="";
  prefix.value="";

  msg("Kaydedildi");
}

function openScaleList(){
  hideAll();
  scaleListPage.classList.remove("hidden");

  scaleList.innerHTML="";
  scaleData.forEach(x=>{
    let div=document.createElement("div");
    div.className="item";
    div.innerHTML=`${x.name}<br>${x.fullCode}<br>${x.price} ₺`;
    scaleList.appendChild(div);
  });
}

function openCalc(){
  hideAll();
  calc.classList.remove("hidden");
  result.innerHTML="";
}

function generateBarcode(code, gram){
  let prefix = getPrefix(code);
  let p = code.padStart(4,"0");
  let g = Math.round(gram).toString().padStart(3,"0");
  return prefix + p + g;
}

function calcScale(){
  let code = c_code.value;
  let gram = parseFloat(c_gram.value);

  if(!code || !gram) return msg("Boş bırakma");

  let product = scaleData.find(x=>x.code==code);
  if(!product) return msg("Ürün yok");

  let total = (gram/1000) * product.price;
  let barcode = generateBarcode(code, gram);

  result.innerHTML = `
    <h3>${product.name}</h3>
    <p>${barcode}</p>
    <p>${gram} g</p>
    <p>${total.toFixed(2)} ₺</p>
    <svg id="bar"></svg>
  `;

  JsBarcode("#bar", barcode);
}

</script>

</body>
</html>
