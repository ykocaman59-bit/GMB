<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Barkod Kayıt Sistemi</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .hidden { display: none; }
        .barcode-item { border-bottom: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
        .barcode-container { display: flex; flex-direction: column; align-items: center; }
        input { padding: 10px; margin: 5px; width: 80%; }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        .btn-list { background: #007bff; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="home-page">
        <h1>Barkod Oluştur</h1>
        <input type="text" id="barcodeInput" placeholder="Barkod Numarası (Örn: 103)">
        <br>
        <button onclick="saveData()">Tamam (OK)</button>
        <br>
        <button class="btn-list" onclick="showList()">Barkodlar Listesine Git</button>
    </div>

    <div id="list-page" class="hidden">
        <h1>Kayıtlı Barkodlar</h1>
        <button onclick="showHome()">← Geri Dön</button>
        <hr>
        <div id="barcode-list"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('myBarcodes')) || [];

        function saveData() {
            let code = document.getElementById('barcodeInput').value;
            if(!code) return alert("Lütfen numara girin!");

            let name = prompt("Ürün adını girin (Örn: Kıvırcık):");
            if(name) {
                db.push({ code: code, name: name });
                localStorage.setItem('myBarcodes', JSON.stringify(db));
                alert("Sisteme kayıt edildi!");
                document.getElementById('barcodeInput').value = "";
            }
        }

        function showList() {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('list-page').classList.remove('hidden');
            renderBarcodes();
        }

        function showHome() {
            document.getElementById('list-page').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
        }

        function renderBarcodes() {
            const listDiv = document.getElementById('barcode-list');
            listDiv.innerHTML = ""; // Temizle

            db.forEach((item, index) => {
                let div = document.createElement('div');
                div.className = "barcode-item";
                
                // Barkodun çizileceği SVG elementi
                let svgId = "barcode-" + index;
                div.innerHTML = `
                    <div class="barcode-container">
                        <svg id="${svgId}"></svg>
                        <p><strong>(${item.code}) ${item.name}</strong></p>
                    </div>
                `;
                listDiv.appendChild(div);

                // JsBarcode ile Code 128 oluşturma
                JsBarcode("#" + svgId, item.code, {
                    format: "CODE128",
                    lineColor: "#000",
                    width: 2,
                    height: 50,
                    displayValue: false // Değeri altına manuel yazdığımız için kapattık
                });
            });
        }
    </script>
</body>
</html>
