<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barkod Sistemi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; text-align: center; }
        .page { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .hidden { display: none; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .btn-blue { background: #007bff; }
        .barcode-item { border-bottom: 2px solid #eee; margin-bottom: 15px; padding-bottom: 10px; background: white; }
        svg { max-width: 100%; height: auto; }
    </style>
</head>
<body>

    <div id="home-page" class="page">
        <h2>Barkod Kayıt</h2>
        <input type="number" id="barcodeInput" placeholder="Barkod No (Örn: 103)">
        <button onclick="saveData()">Sisteme Kayıt Et</button>
        <button class="btn-blue" onclick="showList()">Barkodları Listele</button>
    </div>

    <div id="list-page" class="page hidden">
        <h2>Kayıtlı Barkodlar</h2>
        <button onclick="showHome()" style="background:#6c757d">← Geri Dön</button>
        <div id="barcode-list">
            </div>
    </div>

    <script>
        // Verileri tarayıcı hafızasından al
        let barcodes = JSON.parse(localStorage.getItem('myList')) || [];

        function saveData() {
            const input = document.getElementById('barcodeInput');
            const code = input.value;

            if (!code) {
                alert("Lütfen bir numara girin!");
                return;
            }

            const name = prompt("Ürün adını girin:");
            if (name) {
                barcodes.push({ code: code, name: name });
                localStorage.setItem('myList', JSON.stringify(barcodes));
                alert("Başarıyla kaydedildi!");
                input.value = ""; // Kutuyu temizle
            }
        }

        function showList() {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('list-page').classList.remove('hidden');
            render();
        }

        function showHome() {
            document.getElementById('list-page').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
        }

        function render() {
            const listDiv = document.getElementById('barcode-list');
            listDiv.innerHTML = "";

            if (barcodes.length === 0) {
                listDiv.innerHTML = "<p>Henüz kayıtlı barkod yok.</p>";
                return;
            }

            barcodes.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = "barcode-item";
                
                const svgId = "code-" + index;
                itemDiv.innerHTML = `
                    <svg id="${svgId}"></svg>
                    <p><strong>(${item.code}) ${item.name}</strong></p>
                `;
                listDiv.appendChild(itemDiv);

                // Çizim işlemi
                try {
                    JsBarcode("#" + svgId, item.code, {
                        format: "CODE128",
                        displayValue: false,
                        fontSize: 18,
                        height: 60
                    });
                } catch (e) {
                    console.error("Barkod çizilemedi", e);
                }
            });
        }
    </script>
</body>
</html>
